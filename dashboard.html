<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        card: {
                            DEFAULT: "hsl(var(--card))",
                            foreground: "hsl(var(--card-foreground))",
                        },
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --secondary: 240 4.8% 95.9%;
            --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 46.1%;
            --border: 240 5.9% 90%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 0 0% 98%;
        }
    
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-muted/30 min-h-screen text-foreground flex flex-col">
    <!-- Top Bar -->
    <header class="sticky top-0 z-30 flex h-14 items-center gap-4 border-b border-border bg-background px-4 sm:px-6">
        <button id="mobileMenuBtn"
            class="sm:hidden -ml-2 p-2 text-muted-foreground hover:text-foreground inline-flex items-center">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>
        <div class="font-semibold text-lg mr-auto flex items-center gap-2">
            <svg class="h-5 w-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                </path>
            </svg>
            <span class="truncate">Lab Manager</span>
        </div>
        <div class="hidden sm:flex items-center gap-2">
            <button id="createAdminBtn"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-secondary text-secondary-foreground hover:bg-secondary/80 h-9 px-4">
                <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                </svg>
                Admins <span id="adminCount" class="ml-1.5 px-1.5 py-0.5 bg-primary/10 rounded text-[10px] font-bold">0</span>
            </button>
            <button id="logoutBtn"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">
                <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                Logout
            </button>
        </div>
    </header>
<!-- Mobile Sidebar -->
<div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/50 z-[40] transition-opacity duration-300 opacity-0">
</div>
<aside id="sidebar"
    class="fixed inset-y-0 left-0 w-64 bg-background border-r border-border z-[50] transition-transform duration-300 -translate-x-full lg:hidden flex flex-col">
    <div class="p-6 border-b border-border flex items-center justify-between">
        <span class="font-bold">Navigation</span>
        <button id="closeSidebar" class="p-2 -mr-2 text-muted-foreground hover:text-foreground">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
    <div class="flex-1 p-4 space-y-2">
        <button id="sidebarCreateAdminBtn"
            class="flex w-full items-center gap-3 px-3 py-2 rounded-md hover:bg-secondary text-sm font-medium transition-colors">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
            </svg>
            Manage Admins
        </button>
        <div class="h-px bg-border my-2"></div>
        <button id="sidebarLogoutBtn"
            class="flex w-full items-center gap-3 px-3 py-2 rounded-md hover:bg-destructive/10 hover:text-destructive text-sm font-medium transition-colors">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                </path>
            </svg>
            Sign Out
        </button>
    </div>
</aside>
    <!-- Main Content -->
    <main class="flex-1 p-4 sm:p-6 sm:max-w-6xl mx-auto w-full">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-3xl font-bold tracking-tight">Dashboard</h1>
            <button id="addLabBtn"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4">
                <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Add Lab
            </button>
    </div>
<!-- Labs Grid -->
<div id="labsList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <!-- Labs will be loaded here -->
        </div>
    </main>

    <!-- Create Lab Modal -->
    <div id="createLabModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-card rounded-lg border border-border shadow-lg w-full max-w-sm p-6 relative">
            <div class="flex flex-col space-y-1.5 mb-4">
                <h3 class="font-semibold leading-none tracking-tight text-lg">Create New Lab</h3>
                <p class="text-sm text-muted-foreground">Enter a name for the new computer lab.</p>
            </div>
            <form id="createLabForm" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">Lab Name</label>
                    <input type="text" id="labName" placeholder="e.g. Computer Lab 1" required
                        class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground">
                </div>
                <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 pt-2">
                    <button type="button" id="closeLabModal"
                        class="mt-2 sm:mt-0 inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">
                        Cancel
                    </button>
                    <button type="submit"
                        class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4">
                        Create Lab
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Lab Modal -->
    <div id="editLabModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-card rounded-lg border border-border shadow-lg w-full max-w-sm p-6 relative">
            <div class="flex flex-col space-y-1.5 mb-4">
                <h3 class="font-semibold leading-none tracking-tight text-lg">Edit Lab</h3>
                <p class="text-sm text-muted-foreground">Modify the name of your lab.</p>
            </div>
            <form id="editLabForm" class="space-y-4">
                <input type="hidden" id="editLabId">
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">Lab Name</label>
                    <input type="text" id="editLabName" placeholder="e.g. Computer Lab 1" required
                        class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground">
                </div>
                <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 pt-2">
                    <button type="button" id="closeEditLabModal"
                        class="mt-2 sm:mt-0 inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">
                        Cancel
                    </button>
                    <button type="submit"
                        class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Admin Modal -->
    <div id="adminModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-card rounded-lg border border-border shadow-lg w-full max-w-sm p-6 relative">
            <div class="flex flex-col space-y-1.5 mb-4">
                <h3 class="font-semibold leading-none tracking-tight text-lg">Create New Admin</h3>
                <p class="text-sm text-muted-foreground">Add a new administrator account.</p>
            </div>
            <form id="createAdminForm" class="space-y-4">
                <div class="space-y-2">
                    <label
                        class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Email</label>
                    <input type="email" id="newAdminEmail" required placeholder="admin@example.com"
                        class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground disabled:cursor-not-allowed disabled:opacity-50">
                </div>
                <div class="space-y-2">
                    <label
                        class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Password</label>
                    <div class="relative">
                        <input type="password" id="newAdminPassword" required placeholder="••••••••"
                            class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 pr-10 text-sm shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground disabled:cursor-not-allowed disabled:opacity-50">
                        <button type="button" id="toggleNewAdminPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 pt-2">
                    <button type="button" id="closeAdminModal"
                        class="mt-2 sm:mt-0 inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">
                        Cancel
                    </button>
                    <button type="submit"
                        class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4">
                        Create
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./js/dashboard.js"></script>
<!-- Toast Notification Container -->
<div id="toastContainer" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<!-- Custom Confirmation Modal -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[60] p-4">
    <div
        class="bg-card rounded-lg border border-border shadow-lg w-full max-w-sm p-6 relative animate-in fade-in zoom-in duration-200">
        <h3 id="confirmTitle" class="font-semibold leading-none tracking-tight text-lg mb-2 text-foreground">Are you
            sure?</h3>
        <p id="confirmMessage" class="text-sm text-muted-foreground mb-6">This action cannot be undone.</p>
        <div class="flex justify-end gap-2">
            <button id="confirmCancel"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">Cancel</button>
            <button id="confirmProceed"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-destructive text-destructive-foreground shadow-sm hover:bg-destructive/90 h-9 px-4">Confirm</button>
        </div>
    </div>
</div>
</body>
</html>
