<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        card: {
                            DEFAULT: "hsl(var(--card))",
                            foreground: "hsl(var(--card-foreground))",
                        },
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --secondary: 240 4.8% 95.9%;
            --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 46.1%;
            --border: 240 5.9% 90%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 0 0% 98%;
        }
    
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Mobile: List Layout (Stack) */
        .masonry-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Desktop: Grid Layout */
        @media (min-width: 1024px) {
            .masonry-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }
        }

        .computer-card {
            width: 100%;
        }

        /* Smooth expand/collapse animation */
        .expandable-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Card hover effect */
        .computer-card {
            transition: all 0.3s ease;
        }

        .computer-card:hover {
            transform: translateY(-2px);
        }

        .computer-card.expanded {
            transform: none;
        }

        /* Smooth icon rotation */
        .computer-card svg {
            transition: transform 0.3s ease;
        }

        /* Button hover effects */
        button {
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-muted/30 min-h-screen text-foreground flex flex-col">
    <!-- Header -->
    <header class="sticky top-0 z-30 flex h-14 items-center gap-4 border-b border-border bg-background px-4 sm:px-6">
        <button id="mobileMenuBtn" class="sm:hidden p-2 -ml-2 text-muted-foreground hover:text-foreground">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>
        <a href="./dashboard.html"
            class="hidden sm:inline-flex items-center text-sm font-medium transition-colors hover:text-foreground/80 text-foreground">
            <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Dashboard
        </a>
        <h1 id="labTitle" class="text-sm font-semibold ml-2 sm:ml-4 truncate flex items-center gap-2">
            <svg class="h-4 w-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                </path>
            </svg>
            <span class="truncate">Loading...</span>
        </h1>
    
        <div class="ml-auto hidden sm:flex items-center gap-2">
            <button id="openAddComputerModal"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4">
                <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Computer
            </button>
            <button id="bulkDownloadBtn"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">
                <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Bulk QR
            </button>
        </div>
    </header>

    <!-- Mobile Sidebar -->
    <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/50 z-[40] transition-opacity duration-300 opacity-0">
    </div>
    <aside id="sidebar"
        class="fixed inset-y-0 left-0 w-64 bg-background border-r border-border z-[50] transition-transform duration-300 -translate-x-full lg:hidden flex flex-col">
        <div class="p-6 border-b border-border flex items-center justify-between">
            <span class="font-bold truncate" id="sidebarLabName">Lab Details</span>
            <button id="closeSidebar" class="p-2 -mr-2 text-muted-foreground hover:text-foreground">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div class="flex-1 p-4 space-y-2">
            <a href="./dashboard.html"
                class="flex items-center gap-3 px-3 py-2 rounded-md hover:bg-secondary text-sm font-medium transition-colors text-foreground">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path>
                </svg>
                Go to Dashboard
            </a>
            <button id="sidebarAddComp"
                class="flex w-full items-center gap-3 px-3 py-2 rounded-md hover:bg-secondary text-sm font-medium transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Add Computer
            </button>
            <button id="sidebarBulkQR"
                class="flex w-full items-center gap-3 px-3 py-2 rounded-md hover:bg-secondary text-sm font-medium transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download Bulk QRs
            </button>
        </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 sm:max-w-6xl mx-auto w-full">
        <!-- Computers List Header -->
        <div class="flex items-center justify-between mb-4">
            <h2 class="font-semibold leading-none tracking-tight text-lg flex items-center gap-2">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
                Lab Computers
            </h2>
        </div>
    
        <!-- Computers Grid/List - Grid on Desktop, List on Mobile -->
        <div id="computersList" class="masonry-grid">
            <!-- Computers will be loaded here -->
        </div>
    </main>
    
    <!-- Add Computer Modal -->
    <div id="computerModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-card rounded-lg border border-border shadow-lg w-full max-w-md p-6 relative">
            <div class="flex flex-col space-y-1.5 mb-6">
                <h3 class="font-semibold leading-none tracking-tight text-lg">Add New Computer</h3>
                <p class="text-sm text-muted-foreground">Enter the details of the computer to add it to the lab.</p>
            </div>
            <form id="addComputerForm" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">Computer Number</label>
                    <input type="number" id="computerNumber" placeholder="e.g. 101" required
                        class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">System Details</label>
                    <input type="text" id="computerDetails" placeholder="e.g. i5, 8GB RAM" required
                        class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">Computer Password</label>
                    <div class="relative">
                        <input type="password" id="computerPassword" placeholder="e.g. password123" required
                            class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 pr-10 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground">
                        <button type="button" id="toggleCompPassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                                </path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">Initial Status</label>
                    <div class="relative" id="computerStatusDropdown">
                        <button type="button"
                            class="flex h-9 w-full items-center justify-between rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus:outline-none focus:ring-1 focus:ring-foreground">
                            <span class="selected-value">Working</span>
                            <svg class="h-4 w-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div
                            class="dropdown-options hidden absolute z-50 mt-1 w-full rounded-md border border-border bg-card shadow-lg animate-in fade-in zoom-in-95 duration-200">
                            <div class="p-1">
                                <button type="button" data-value="Working"
                                    class="flex w-full items-center rounded-sm px-2 py-1.5 text-sm outline-none hover:bg-muted transition-colors">Working</button>
                                <button type="button" data-value="Not Working"
                                    class="flex w-full items-center rounded-sm px-2 py-1.5 text-sm outline-none hover:bg-muted transition-colors">Not
                                    Working</button>
                            </div>
                        </div>
                        <input type="hidden" id="computerStatus" value="Working">
                    </div>
                </div>
    
                <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 pt-4">
                    <button type="button" id="closeComputerModal"
                        class="mt-2 sm:mt-0 inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">
                        Cancel
                    </button>
                    <button type="submit"
                        class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4">
                        Add Computer
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Computer Modal -->
    <div id="editComputerModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-card rounded-lg border border-border shadow-lg w-full max-w-md p-6 relative">
            <div class="flex flex-col space-y-1.5 mb-6">
                <h3 class="font-semibold leading-none tracking-tight text-lg">Edit Computer</h3>
                <p class="text-sm text-muted-foreground">Update details for this system.</p>
            </div>
            <form id="editComputerForm" class="space-y-4">
                <input type="hidden" id="editCompId">
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">Computer Number</label>
                    <input type="number" id="editCompNumber" placeholder="e.g. 101" required
                        class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">System Details</label>
                    <input type="text" id="editCompDetails" placeholder="e.g. i5, 8GB RAM" required
                        class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">Computer Password</label>
                    <div class="relative">
                        <input type="password" id="editCompPassword" placeholder="e.g. password123" required
                            class="flex h-9 w-full rounded-md border border-border bg-transparent px-3 py-1 pr-10 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-foreground">
                        <button type="button" id="toggleEditCompPassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium leading-none">Status</label>
                    <div class="relative" id="editCompStatusDropdown">
                        <button type="button"
                            class="flex h-9 w-full items-center justify-between rounded-md border border-border bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus:outline-none focus:ring-1 focus:ring-foreground">
                            <span class="selected-value">Working</span>
                            <svg class="h-4 w-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div
                            class="dropdown-options hidden absolute z-50 mt-1 w-full rounded-md border border-border bg-card shadow-lg animate-in fade-in zoom-in-95 duration-200">
                            <div class="p-1">
                                <button type="button" data-value="Working"
                                    class="flex w-full items-center rounded-sm px-2 py-1.5 text-sm outline-none hover:bg-muted transition-colors">Working</button>
                                <button type="button" data-value="Not Working"
                                    class="flex w-full items-center rounded-sm px-2 py-1.5 text-sm outline-none hover:bg-muted transition-colors">Not
                                    Working</button>
                            </div>
                        </div>
                        <input type="hidden" id="editCompStatus" value="Working">
                    </div>
                </div>
    
                <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 pt-4">
                    <button type="button" id="closeEditComputerModal"
                        class="mt-2 sm:mt-0 inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">
                        Cancel
                    </button>
                    <button type="submit"
                        class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./js/lab.js"></script>
<!-- Toast Notification Container -->
<div id="toastContainer" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<!-- Custom Confirmation Modal -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[60] p-4">
    <div
        class="bg-card rounded-lg border border-border shadow-lg w-full max-w-sm p-6 relative animate-in fade-in zoom-in duration-200">
        <h3 id="confirmTitle" class="font-semibold leading-none tracking-tight text-lg mb-2 text-foreground">Are you
            sure?</h3>
        <p id="confirmMessage" class="text-sm text-muted-foreground mb-6">This action cannot be undone.</p>
        <div class="flex justify-end gap-2">
            <button id="confirmCancel"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors border border-border bg-background hover:bg-muted h-9 px-4">Cancel</button>
            <button id="confirmProceed"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-destructive text-destructive-foreground shadow-sm hover:bg-destructive/90 h-9 px-4">Confirm</button>
        </div>
    </div>
</div>

<!-- Reviews Detail Modal -->
<div id="reviewsModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div
        class="bg-card rounded-lg border border-border shadow-lg w-full max-w-lg p-6 relative max-h-[80vh] flex flex-col">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold leading-none tracking-tight text-lg">Computer Reviews</h3>
            <button id="closeReviewsModal" class="text-muted-foreground hover:text-foreground">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <div id="modalReviewsList" class="flex-1 overflow-y-auto space-y-3 pr-2">
            <!-- Reviews will be loaded here -->
        </div>
    </div>
</div>
</body>
</html>

<!-- QR Details Modal -->
<div id="qrDetailsModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-card rounded-lg border border-border shadow-lg w-full max-w-md p-6 relative">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold leading-none tracking-tight text-lg">Computer QR Code</h3>
            <button id="closeQRModal" class="text-muted-foreground hover:text-foreground">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <div id="qrModalContent" class="space-y-4">
            <!-- QR Code will be loaded here -->
        </div>
        <div class="mt-4">
            <button id="downloadQRFromModal"
                class="w-full inline-flex items-center justify-center rounded-lg border border-primary bg-primary text-primary-foreground hover:bg-primary/90 h-9 text-sm font-medium transition-all duration-200">
                <svg class="mr-1.5 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download QR Code
            </button>
        </div>
    </div>
</div>
