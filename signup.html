<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create First Admin - TEMPORARY PAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🔐 Create First Admin</h1>
            <p class="text-red-600 font-semibold">⚠️ TEMPORARY PAGE - Delete after use!</p>
        </div>

        <form id="signupForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" required placeholder="admin@example.com"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" required placeholder="Minimum 6 characters"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>

            <button type="submit"
                class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition duration-200">
                Create Admin Account
            </button>
        </form>

        <div id="message" class="mt-4 text-center text-sm"></div>

        <div class="mt-6 text-center">
            <a href="/index.html" class="text-blue-600 hover:underline">← Back to Login</a>
        </div>

        <div class="mt-8 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
            <p class="text-sm text-yellow-800">
                <strong>⚠️ Important:</strong> After creating your first admin account, 
                <strong>DELETE THIS FILE (signup.html)</strong> from your project for security!
            </p>
        </div>
    </div>

    <script type="module" src="/js/signup.js"></script>
</body>
</html>
